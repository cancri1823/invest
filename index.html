<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資理財管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-light:#1a2f52;--navy-mid:#243a63;
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-pale:#faf4e4;
  --text:#1a1a2e;--text-muted:#5a6478;--text-light:#8892a4;
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f8;
  --border:#e0e4ef;--border-light:#edf0f7;
  --green:#1a7a4a;--green-bg:#e8f7ef;
  --red:#c0392b;--red-bg:#fdecea;
  --radius:8px;--radius-lg:12px;
  --shadow:0 2px 8px rgba(15,31,61,0.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}

/* Sidebar */
#sidebar{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;min-height:100vh;transition:width 0.2s}
#sidebar.collapsed{width:60px;min-width:60px}
.brand{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08)}
.brand-icon{width:32px;height:32px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon i{color:var(--navy);font-size:18px}
.brand-text{color:#fff;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden}
nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.15s;margin-bottom:2px;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.nav-item.active{background:var(--gold);color:var(--navy);font-weight:600}
.nav-item i{font-size:18px;flex-shrink:0}
.nav-label{font-size:13px}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,0.08)}
#toggle-sidebar{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:8px 12px;border-radius:var(--radius);display:flex;align-items:center;gap:8px;width:100%}
#toggle-sidebar:hover{color:#fff}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}

/* Sync bar */
#syncbar{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 24px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted);min-height:32px}
#syncbar.syncing{background:#fffbeb}
#syncbar.error{background:#fff1f0}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.connected{background:var(--green)}
.sync-dot.disconnected{background:#9ca3af}
.sync-dot.syncing{background:var(--gold);animation:syncpulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes syncpulse{0%,100%{opacity:0.3}50%{opacity:1}}
.sync-actions{margin-left:auto;display:flex;gap:6px}

.topbar-title{font-size:16px;font-weight:600;color:var(--navy)}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s}
.btn:hover{background:var(--surface2);border-color:var(--navy)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy-light)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold-light)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:var(--green-bg);color:var(--green);border-color:var(--green)}

#content{flex:1;padding:24px;overflow-y:auto}
.page{display:none}
.page.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface2);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:600;color:var(--navy)}
.stat-value.pos{color:var(--green)}
.stat-value.neg{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text-light);margin-top:2px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;background:var(--surface2);color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.td-right{text-align:right}
.td-center{text-align:center}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-in{background:var(--green-bg);color:var(--green)}
.tag-out{background:var(--red-bg);color:var(--red)}
.tag-interest{background:#e8f4fd;color:#0e6fa8}
.tag-dividend{background:#f0e8fd;color:#6a20b0}
.tag-spot{background:#fff3e0;color:#8a5000}
.tag-cash{background:#e8f5e9;color:#2e7d32}
.pos{color:var(--green);font-weight:500}
.neg{color:var(--red);font-weight:500}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:var(--text-muted)}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--navy)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600;color:var(--navy)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Responsive */
@media(max-width:768px){
  #sidebar{width:60px;min-width:60px}
  .nav-label,.brand-text{display:none}
  .brand{justify-content:center}
  #content{padding:16px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .topbar-title{font-size:14px}
}

/* Bank tabs */
.bank-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:2px solid var(--border);margin-bottom:16px;flex-wrap:nowrap}
.bank-tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.bank-tab:hover{color:var(--navy);background:var(--surface2)}
.bank-tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.bank-tab.add-tab{color:var(--gold);font-weight:600}
.bank-tab.add-tab:hover{background:var(--gold-pale)}
.bank-tab .tab-balance{font-size:11px;color:var(--text-muted);font-weight:400}
.bank-tab.active .tab-balance{color:var(--navy)}
.bank-rename-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px 4px;border-radius:4px;font-size:12px;margin-left:2px}
.bank-rename-btn:hover{color:var(--red);background:var(--red-bg)}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
#toast.show{opacity:1}

/* Multi-select */
#select-bar{display:none;position:fixed;bottom:0;left:220px;right:0;background:var(--navy);color:#fff;padding:10px 24px;z-index:200;align-items:center;gap:12px;box-shadow:0 -4px 16px rgba(0,0,0,0.2);transition:left 0.2s}
#select-bar.show{display:flex}
#sidebar.collapsed ~ #main #select-bar{left:60px}
.select-bar-info{font-size:13px}
.select-bar-info strong{color:var(--gold-light)}
input[type=checkbox].row-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--gold);flex-shrink:0}
th.cb-th{width:36px;text-align:center}
td.cb-td{width:36px;text-align:center;vertical-align:middle}
tr.row-selected td{background:rgba(201,168,76,0.08)!important}
tr.row-selected td:first-child{border-left:3px solid var(--gold)}
</style>
</head>
<body>

<div id="sidebar">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-report-money"></i></div>
    <span class="brand-text">理財管理</span>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
      <i class="ti ti-layout-dashboard"></i><span class="nav-label">總覽</span>
    </div>
    <div class="nav-item" onclick="showPage('bank')" data-page="bank">
      <i class="ti ti-building-bank"></i><span class="nav-label">銀行存款</span>
    </div>
    <div class="nav-item" onclick="showPage('forex')" data-page="forex">
      <i class="ti ti-currency-exchange"></i><span class="nav-label">外匯交易</span>
    </div>
    <div class="nav-item" onclick="showPage('fund')" data-page="fund">
      <i class="ti ti-chart-area"></i><span class="nav-label">基金交易</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <button id="toggle-sidebar" onclick="toggleSidebar()">
      <i class="ti ti-layout-sidebar-left-collapse"></i>
    </button>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <span class="topbar-title" id="page-title">總覽</span>
    <div class="topbar-actions">
      <button class="btn btn-sm" id="gdrive-btn" onclick="handleGoogleAuth()"><i class="ti ti-brand-google-drive"></i> <span id="gdrive-btn-text">連結 Google Drive</span></button>
      <button class="btn btn-sm" onclick="exportData()"><i class="ti ti-download"></i> 匯出 Excel</button>
      <button class="btn btn-sm" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload"></i> 匯入 Excel</button>
      <input type="file" id="import-file" accept=".xlsx,.xls" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div id="syncbar">
    <div class="sync-dot disconnected" id="sync-dot"></div>
    <span id="sync-status">尚未連結 Google Drive，資料暫存於此裝置</span>
    <div class="sync-actions">
      <button class="btn btn-sm" id="sync-now-btn" style="display:none" onclick="syncNow()"><i class="ti ti-refresh"></i> 立即同步</button>
      <button class="btn btn-sm btn-danger" id="signout-btn" style="display:none" onclick="signOut()"><i class="ti ti-logout"></i> 登出</button>
    </div>
  </div>

  <div id="content">

    <div id="page-dashboard" class="page active">
      <div class="stat-grid" id="dash-stats"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
        <div class="card">
          <div class="card-title" style="margin-bottom:12px"><i class="ti ti-building-bank"></i> 銀行存款摘要</div>
          <div id="dash-bank"></div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:12px"><i class="ti ti-currency-exchange"></i> 外匯摘要</div>
          <div id="dash-forex"></div>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:12px"><i class="ti ti-chart-area"></i> 基金摘要</div>
          <div id="dash-fund"></div>
        </div>
      </div>
    </div>

    <div id="page-bank" class="page">
      <!-- 銀行總覽 stat -->
      <div class="stat-grid" id="bank-stats" style="margin-bottom:16px"></div>
      <div class="card">
        <!-- Tab 列 -->
        <div class="bank-tabs" id="bank-tabs"></div>
        <!-- 目前銀行標題列 -->
        <div class="card-header" style="margin-bottom:8px">
          <div class="card-title" id="bank-tab-title"><i class="ti ti-building-bank"></i> 請選擇或新增銀行</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm" onclick="toggleSelectMode('bank')"><i class="ti ti-checkbox"></i> 選取刪除</button>
            <button class="btn btn-gold btn-sm" id="bank-add-record-btn" onclick="openBankRecordModal()" style="display:none"><i class="ti ti-plus"></i> 新增記錄</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="bank-thead"><tr><th>日期</th><th>摘要</th><th>類型</th><th class="td-right">金額 (TWD)</th><th class="td-right">餘額</th><th></th></tr></thead>
            <tbody id="bank-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="page-forex" class="page">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-currency-exchange"></i> 外匯交易紀錄</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm" onclick="openForexRateModal()"><i class="ti ti-refresh"></i> 更新匯率</button>
            <button class="btn btn-sm" onclick="toggleSelectMode('forex')"><i class="ti ti-checkbox"></i> 選取刪除</button>
            <button class="btn btn-gold btn-sm" onclick="openModal('forex-modal')"><i class="ti ti-plus"></i> 新增</button>
          </div>
        </div>
        <div class="stat-grid" id="forex-stats"></div>
        <div class="table-wrap">
          <table>
            <thead id="forex-thead"><tr><th>日期</th><th>幣別</th><th>類型</th><th>方向</th><th class="td-right">外幣金額</th><th class="td-right">匯率</th><th class="td-right">台幣金額</th><th>備註</th><th></th></tr></thead>
            <tbody id="forex-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">各幣別持倉</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>幣別</th><th class="td-right">持有外幣</th><th class="td-right">平均成本匯率</th><th class="td-right">投入台幣</th><th class="td-right">即期匯率</th><th class="td-right">現金匯率</th><th class="td-right">現值(即期)</th><th class="td-right">現值(現金)</th><th class="td-right">損益</th></tr></thead>
            <tbody id="forex-summary-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="page-fund" class="page">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-chart-area"></i> 基金交易紀錄</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm" onclick="toggleSelectMode('fund')"><i class="ti ti-checkbox"></i> 選取刪除</button>
            <button class="btn btn-gold btn-sm" onclick="openModal('fund-modal')"><i class="ti ti-plus"></i> 新增</button>
          </div>
        </div>
        <div class="stat-grid" id="fund-stats"></div>
        <div class="table-wrap">
          <table>
            <thead id="fund-thead"><tr><th>日期</th><th>基金名稱</th><th>類型</th><th class="td-right">金額(台幣)</th><th class="td-right">單位數</th><th class="td-right">淨值</th><th>備註</th><th></th></tr></thead>
            <tbody id="fund-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">基金持倉摘要</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>基金名稱</th><th class="td-right">持有單位數</th><th class="td-right">投入成本</th><th class="td-right">現值估算</th><th>備註</th></tr></thead>
            <tbody id="fund-summary-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="modal-bg" id="bank-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="bank-modal-title">新增收支記錄</span>
      <button class="btn btn-sm" onclick="closeModal('bank-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>日期</label><input type="date" id="bank-date"></div>
        <div class="form-group"><label>摘要</label><input type="text" id="bank-desc" placeholder="薪資、轉帳..."></div>
        <div class="form-group"><label>類型</label>
          <select id="bank-type"><option value="in">收入</option><option value="out">支出</option><option value="interest">利息</option><option value="dividend">股利</option></select>
        </div>
        <div class="form-group"><label>金額 (TWD)</label><input type="number" id="bank-amount" placeholder="0"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('bank-modal')">取消</button>
      <button class="btn btn-primary" onclick="addBank()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增銀行 Modal -->
<div class="modal-bg" id="new-bank-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title" id="new-bank-modal-title">新增銀行</span>
      <button class="btn btn-sm" onclick="closeModal('new-bank-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>銀行名稱</label>
        <input type="text" id="new-bank-name" placeholder="e.g. 台灣銀行、郵局">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="delete-bank-btn" style="display:none;margin-right:auto" onclick="deleteCurrentBank()"><i class="ti ti-trash"></i> 刪除此銀行</button>
      <button class="btn" onclick="closeModal('new-bank-modal')">取消</button>
      <button class="btn btn-primary" id="new-bank-save-btn" onclick="addBankAccount()">新增</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="forex-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新增外匯交易</span>
      <button class="btn btn-sm" onclick="closeModal('forex-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>日期</label><input type="date" id="forex-date"></div>
        <div class="form-group"><label>幣別</label>
          <select id="forex-currency">
            <option value="USD">美元 USD</option><option value="JPY">日圓 JPY</option>
            <option value="EUR">歐元 EUR</option><option value="GBP">英鎊 GBP</option>
            <option value="AUD">澳幣 AUD</option><option value="CNY">人民幣 CNY</option>
            <option value="HKD">港幣 HKD</option><option value="SGD">新幣 SGD</option>
            <option value="KRW">韓圜 KRW</option>
          </select>
        </div>
        <div class="form-group"><label>交易類型</label>
          <select id="forex-trans-type"><option value="spot">即期</option><option value="cash">現金</option></select>
        </div>
        <div class="form-group"><label>買/賣</label>
          <select id="forex-dir"><option value="buy">買入外幣</option><option value="sell">賣出外幣</option></select>
        </div>
        <div class="form-group"><label>外幣金額</label><input type="number" id="forex-amount" placeholder="0" step="0.01"></div>
        <div class="form-group"><label>匯率 (TWD per 外幣)</label><input type="number" id="forex-rate" placeholder="0" step="0.0001"></div>

<script>
let db = {bank:[],forex:[],fund:[],forexRates:{},forexSpotRates:{},forexCashRates:{},cashSpread:{},meta:{version:1}};
let sidebarCollapsed = false;
let forexRateLoading = false;
let currentBank = ''; // 目前選取的銀行 tab

// Constants
const BANK_IN_TYPES = ['in','interest','dividend'];
const BANK_TYPE_LABEL = {in:'收入',out:'支出',interest:'利息',dividend:'股利'};
const BANK_TYPE_TAG   = {in:'tag-in',out:'tag-out',interest:'tag-interest',dividend:'tag-dividend'};
const FOREX_SYMBOLS = {
  USD:'USDTWD=X', JPY:'JPYTWD=X', EUR:'EURTWD=X', GBP:'GBPTWD=X',
  AUD:'AUDTWD=X', CNY:'CNYTWD=X', HKD:'HKDTWD=X', SGD:'SGDTWD=X', KRW:'KRWTWD=X'
};

// ================================================================
// Google Drive Sync
// ================================================================
const CLIENT_ID = '151662671811-2kvc4psjckl0umlklushu7b2k86gtcr8.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'invest_data.json';

let tokenClient = null;
let accessToken = null;
let driveFileId = null;
let syncTimer = null;
let gapiReady = false;
let gisReady = false;

function initGoogleAPIs(){
  const waitGapi = setInterval(()=>{
    if(window.gapi){
      clearInterval(waitGapi);
      gapi.load('client', async ()=>{
        try{
          await gapi.client.init({});
          gapiReady = true;
          tryAutoSignIn();
        }catch(e){ console.warn('gapi init error',e); }
      });
    }
  }, 100);

  const waitGIS = setInterval(()=>{
    if(window.google?.accounts?.oauth2){
      clearInterval(waitGIS);
      try{
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: async (resp)=>{
            if(resp.error){ setSyncStatus('error','授權失敗：'+resp.error); return; }
            accessToken = resp.access_token;
            localStorage.setItem('invest_gdrive_token', accessToken);
            gapi.client.setToken({access_token: accessToken});
            setSyncStatus('syncing','正在讀取雲端資料…');
            await loadFromDrive();
          }
        });
        gisReady = true;
        tryAutoSignIn();
      }catch(e){ console.warn('GIS init error',e); }
    }
  }, 100);

  setTimeout(()=>{
    clearInterval(waitGapi);
    clearInterval(waitGIS);
  }, 15000);
}

function tryAutoSignIn(){
  if(!gapiReady || !gisReady) return;
  const saved = localStorage.getItem('invest_gdrive_token');
  if(saved){
    accessToken = saved;
    gapi.client.setToken({access_token: accessToken});
    setSyncStatus('syncing','正在驗證連線…');
    loadFromDrive().catch(()=>{
      accessToken = null;
      localStorage.removeItem('invest_gdrive_token');
      setSyncStatus('disconnected','登入已過期，請重新連結 Google Drive');
    });
  }
}

function handleGoogleAuth(){
  if(accessToken){ signOut(); return; }
  if(!gisReady){
    let waited=0;
    const wait=setInterval(()=>{
      waited+=200;
      if(gisReady){ clearInterval(wait); tokenClient.requestAccessToken({prompt:''}); }
      else if(waited>=8000){ clearInterval(wait); toast('Google 服務載入逾時，請重新整理頁面再試'); }
    },200);
    toast('Google 服務載入中，請稍候…');
    return;
  }
  tokenClient.requestAccessToken({prompt:''});
}

function signOut(){
  if(accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null; driveFileId = null;
  localStorage.removeItem('invest_gdrive_token');
  setSyncStatus('disconnected','已登出，資料暫存於此裝置');
  document.getElementById('gdrive-btn-text').textContent = '連結 Google Drive';
  document.getElementById('sync-now-btn').style.display = 'none';
  document.getElementById('signout-btn').style.display = 'none';
}

function setSyncStatus(state, msg){
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-status').textContent = msg;
  document.getElementById('syncbar').className = state==='syncing'?'syncing':state==='error'?'error':'';
  if(state==='connected'){
    document.getElementById('gdrive-btn-text').textContent = '已連結 Drive';
    document.getElementById('sync-now-btn').style.display = '';
    document.getElementById('signout-btn').style.display = '';
  }
}

async function getDriveFileId(){
  if(driveFileId) return driveFileId;
  const resp = await gapi.client.request({
    path:'https://www.googleapis.com/drive/v3/files',
    params:{spaces:'appDataFolder', q:`name='${FILE_NAME}'`, fields:'files(id,name)'}
  });
  const files = resp.result.files;
  if(files && files.length > 0) driveFileId = files[0].id;
  return driveFileId;
}

async function loadFromDrive(){
  try{
    const fid = await getDriveFileId();
    if(!fid){
      setSyncStatus('connected','已連結 Google Drive（首次使用，上傳本機資料中…）');
      await saveToDrive();
      setSyncStatus('connected','已連結 Google Drive ✓ — '+new Date().toLocaleTimeString('zh-TW'));
      return;
    }
    const resp = await gapi.client.request({
      path:`https://www.googleapis.com/drive/v3/files/${fid}`,
      params:{alt:'media'}
    });
    const cloudDb = JSON.parse(resp.body);
    if(cloudDb && typeof cloudDb==='object' && Array.isArray(cloudDb.bank)){
      db = {bank:[],forex:[],fund:[],bankAccounts:[],forexRates:{},forexSpotRates:{},forexCashRates:{},cashSpread:{},meta:{version:1}, ...cloudDb};
      db.bankAccounts = db.bankAccounts || [];
      db.forexRates = db.forexRates || {};
      db.forexSpotRates = db.forexSpotRates || {};
      db.forexCashRates = db.forexCashRates || {};
      db.cashSpread = db.cashSpread || {};
      if(!currentBank && db.bankAccounts.length>0) currentBank=db.bankAccounts[0];
      migrateDates();
      saveLocal(); renderAll();
    }
    setSyncStatus('connected','已連結 Google Drive ✓ — 上次同步：'+new Date().toLocaleTimeString('zh-TW'));
    toast('Google Drive 資料已載入');
  }catch(e){
    if(e.status===401){
      accessToken=null; localStorage.removeItem('invest_gdrive_token');
      setSyncStatus('error','登入已過期，請重新連結 Google Drive');
    }else{
      setSyncStatus('error','同步失敗：'+(e.result?.error?.message||e.message||'未知錯誤'));
    }
    throw e;
  }
}

async function saveToDrive(){
  if(!accessToken) return;
  const content = JSON.stringify(db);
  const boundary = 'invest_boundary';
  const fid = await getDriveFileId();
  const metadata = JSON.stringify({name:FILE_NAME, parents:fid?undefined:['appDataFolder']});
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  const method = fid?'PATCH':'POST';
  const path = fid
    ?`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=multipart`
    :`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&spaces=appDataFolder`;
  const resp = await fetch(path,{
    method,
    headers:{'Authorization':'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
    body
  });
  if(!resp.ok){ const err=await resp.json(); throw new Error(err.error?.message||'上傳失敗'); }
  driveFileId = (await resp.json()).id;
}

async function syncNow(){
  if(!accessToken){toast('尚未連結 Google Drive');return;}
  setSyncStatus('syncing','同步中…');
  try{
    await saveToDrive();
    setSyncStatus('connected','已連結 Google Drive ✓ — 上次同步：'+new Date().toLocaleTimeString('zh-TW'));
    toast('已同步至 Google Drive');
  }catch(e){
    setSyncStatus('error','同步失敗：'+(e.message||'請重試'));
    toast('同步失敗，請重試');
  }
}

function scheduleSyncToDrive(){
  if(!accessToken) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async ()=>{
    setSyncStatus('syncing','自動同步中…');
    try{
      await saveToDrive();
      setSyncStatus('connected','已連結 Google Drive ✓ — 上次同步：'+new Date().toLocaleTimeString('zh-TW'));
    }catch(e){
      setSyncStatus('error','自動同步失敗，請手動同步');
    }
  }, 1500);
}

function migrateDates(){
  ['bank','forex','fund'].forEach(type=>{
    (db[type]||[]).forEach(r=>{ if(r.date) r.date=fmtDate(r.date); });
  });
}

function saveLocal(){ localStorage.setItem('invest_db',JSON.stringify(db)); }
function load(){
  const s=localStorage.getItem('invest_db');
  if(s)try{
    const localDb = JSON.parse(s);
    db = {bank:[],forex:[],fund:[],bankAccounts:[],forexRates:{},forexSpotRates:{},forexCashRates:{},cashSpread:{},meta:{version:1}, ...localDb};
    db.bankAccounts = db.bankAccounts || [];
    db.forexRates = db.forexRates || {};
    db.forexSpotRates = db.forexSpotRates || {};
    db.forexCashRates = db.forexCashRates || {};
    db.cashSpread = db.cashSpread || {};
    if(!currentBank && db.bankAccounts.length>0) currentBank=db.bankAccounts[0];
    migrateDates();
  }catch(e){}
}
function save(){ saveLocal(); scheduleSyncToDrive(); }
function toast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function fmt(n,d=0){return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d})}
function pnl(n){return n>=0?`<span class="pos">+${fmt(n)}</span>`:`<span class="neg">${fmt(n)}</span>`}
function pnlPct(n){return n>=0?`<span class="pos">+${n.toFixed(2)}%</span>`:`<span class="neg">${n.toFixed(2)}%</span>`}
function today(){return new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'/')}
function todayInput(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){
  if(!d)return'—';
  const s=String(d).replace(/-/g,'/');
  const parts=s.split('/');
  if(parts.length===3) return `${parts[0]}/${parseInt(parts[1])}/${parseInt(parts[2])}`;
  return s;
}
function excelDateToStr(v){
  if(typeof v==='number'){
    const d=new Date(Math.round((v-25569)*86400*1000));
    return `${d.getUTCFullYear()}/${d.getUTCMonth()+1}/${d.getUTCDate()}`;
  }
  if(typeof v==='string') return fmtDate(v);
  return String(v||'');
}
function normalizeDate(d){
  if(!d)return'';
  return String(d).replace(/-/g,'/');
}

// ================================================================
// Multi-select
// ================================================================
let selectMode = false;
let selectType = ''; 
let selectedIds = new Set();

function toggleSelectMode(type){
  if(selectMode && selectType===type){
    selectMode=false; selectType=''; selectedIds.clear();
    document.getElementById('select-bar').classList.remove('show');
    ['bank','forex','fund'].forEach(t=>{
      const el=document.getElementById(t+'-th-cb');
      if(el)el.innerHTML='';
    });
    renderAll(); return;
  }
  selectMode=true; selectType=type; selectedIds.clear();
  document.getElementById('select-bar').classList.add('show');
  document.getElementById('select-count').textContent='0';
  document.getElementById('delete-selected-btn').disabled=true;
  renderAll();
}

function toggleRowSelect(id, cb){
  if(cb.checked) selectedIds.add(id);
  else selectedIds.delete(id);
  updateSelectBar();
  const row=document.querySelector(`tr[data-rid="${id}"]`);
  if(row) row.classList.toggle('row-selected', cb.checked);
}

function updateSelectBar(){
  const n=selectedIds.size;
  document.getElementById('select-count').textContent=n;
  document.getElementById('delete-selected-btn').disabled=n===0;
}

function selectAll(){
  db[selectType].forEach(r=>selectedIds.add(r.id));
  updateSelectBar(); renderAll();
}

function deselectAll(){
  selectedIds.clear();
  updateSelectBar(); renderAll();
}

function deleteSelected(){
  if(!selectedIds.size)return;
  const n=selectedIds.size;
  if(!confirm(`確定刪除選取的 ${n} 筆記錄？此操作無法復原。`))return;
  db[selectType]=db[selectType].filter(r=>!selectedIds.has(r.id));
  selectedIds.clear();
  save(); updateSelectBar(); renderAll();
  toast(`已刪除 ${n} 筆記錄`);
}

const THEAD_NORMAL = {
  bank:  '<tr><th>日期</th><th>摘要</th><th>類型</th><th class="td-right">金額 (TWD)</th><th class="td-right">餘額</th><th></th></tr>',
  forex: '<tr><th>日期</th><th>幣別</th><th>類型</th><th>方向</th><th class="td-right">外幣金額</th><th class="td-right">匯率</th><th class="td-right">台幣金額</th><th>備註</th><th></th></tr>',
  fund:  '<tr><th>日期</th><th>基金名稱</th><th>類型</th><th class="td-right">金額(台幣)</th><th class="td-right">單位數</th><th class="td-right">淨值</th><th>備註</th><th></th></tr>',
};
const THEAD_CB = {
  bank:  '<tr><th class="cb-th"><input type="checkbox" class="row-cb" id="bank-cb-all" onclick="if(this.checked)selectAll();else deselectAll()"></th><th>日期</th><th>摘要</th><th>類型</th><th class="td-right">金額 (TWD)</th><th class="td-right">餘額</th><th></th></tr>',
  forex: '<tr><th class="cb-th"><input type="checkbox" class="row-cb" id="forex-cb-all" onclick="if(this.checked)selectAll();else deselectAll()"></th><th>日期</th><th>幣別</th><th>類型</th><th>方向</th><th class="td-right">外幣金額</th><th class="td-right">匯率</th><th class="td-right">台幣金額</th><th>備註</th><th></th></tr>',
  fund:  '<tr><th class="cb-th"><input type="checkbox" class="row-cb" id="fund-cb-all" onclick="if(this.checked)selectAll();else deselectAll()"></th><th>日期</th><th>基金名稱</th><th>類型</th><th class="td-right">金額(台幣)</th><th class="td-right">單位數</th><th class="td-right">淨值</th><th>備註</th><th></th></tr>',
};

function renderSelectAllCb(type, data){
  const thead = document.getElementById(type+'-thead');
  if(!thead) return;
  if(selectMode && selectType===type){
    thead.innerHTML = THEAD_CB[type];
    const cb = document.getElementById(type+'-cb-all');
    if(cb){
      const allChecked = data.length>0 && data.every(r=>selectedIds.has(r.id));
      const someChecked = data.some(r=>selectedIds.has(r.id));
      cb.checked = allChecked;
      cb.indeterminate = !allChecked && someChecked;
    }
  } else {
    thead.innerHTML = THEAD_NORMAL[type];
  }
}

function cbCell(type, id){
  if(!selectMode||selectType!==type) return '';
  const checked=selectedIds.has(id)?'checked':'';
  return `<td class="cb-td"><input type="checkbox" class="row-cb" ${checked} onclick="toggleRowSelect(${id},this)"></td>`;
}

function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);
}

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelector(`[data-page="${p}"]`).classList.add('active');
  const titles={dashboard:'總覽',bank:'銀行存款',forex:'外匯交易',fund:'基金交易'};
  document.getElementById('page-title').textContent=titles[p];
  renderAll();
}

function openModal(id){
  document.getElementById(id).classList.add('show');
  const dateFields={
    'bank-modal':'bank-date',
    'forex-modal':'forex-date','fund-modal':'fund-date'
  };
  if(dateFields[id]) document.getElementById(dateFields[id]).value=todayInput();
}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// ---- 取得所有銀行名稱（依出現順序）----
function getBankList(){
  const seen=new Set();
  const list=[];
  // 從 db.bankAccounts 取得順序（新增銀行時儲存順序）
  (db.bankAccounts||[]).forEach(n=>{if(!seen.has(n)){seen.add(n);list.push(n);}});
  // 再從記錄補遺
  db.bank.forEach(r=>{if(r.name&&!seen.has(r.name)){seen.add(r.name);list.push(r.name);}});
  return list;
}

function getBankBalance(bankName){
  let bal=0;
  db.bank.filter(r=>r.name===bankName).forEach(r=>{
    bal+=BANK_IN_TYPES.includes(r.type)?r.amount:-r.amount;
  });
  return bal;
}

function openBankRecordModal(){
  if(!currentBank){toast('請先選擇銀行');return}
  document.getElementById('bank-modal-title').textContent=`新增記錄 — ${currentBank}`;
  document.getElementById('bank-date').value=todayInput();
  document.getElementById('bank-desc').value='';
  document.getElementById('bank-amount').value='';
  document.getElementById('bank-type').value='in';
  document.getElementById('bank-modal').classList.add('show');
}

function addBank(){
  const date=document.getElementById('bank-date').value;
  const desc=document.getElementById('bank-desc').value.trim();
  const type=document.getElementById('bank-type').value;
  const amount=parseFloat(document.getElementById('bank-amount').value)||0;
  if(!date||!currentBank||!amount){toast('請填寫必要欄位');return}
  db.bank.push({id:Date.now(),date:normalizeDate(date),name:currentBank,desc,type,amount});
  db.bank.sort((a,b)=>a.date.localeCompare(b.date));
  save();closeModal('bank-modal');renderBank();toast('已新增記錄');
}

function addBankAccount(){
  const name=document.getElementById('new-bank-name').value.trim();
  if(!name){toast('請輸入銀行名稱');return}
  if(!db.bankAccounts) db.bankAccounts=[];
  if(db.bankAccounts.includes(name)||db.bank.some(r=>r.name===name)){
    toast('此銀行已存在');return;
  }
  db.bankAccounts.push(name);
  save();closeModal('new-bank-modal');
  currentBank=name;
  renderBank();toast(`已新增銀行：${name}`);
}

function openNewBankModal(){

  document.getElementById('new-bank-name').value=bankName;

function renameBankAccount(oldName){
  const newName=document.getElementById('new-bank-name').value.trim();
  if(!newName){toast('請輸入名稱');return}
  if(newName!==oldName){
    // 更新 bankAccounts 順序
    if(!db.bankAccounts) db.bankAccounts=getBankList();
    const idx=db.bankAccounts.indexOf(oldName);
    if(idx>-1) db.bankAccounts[idx]=newName;
    else db.bankAccounts=db.bankAccounts.map(n=>n===oldName?newName:n);
    // 更新所有記錄
    db.bank.forEach(r=>{if(r.name===oldName)r.name=newName;});
    if(currentBank===oldName) currentBank=newName;
  }
  save();closeModal('new-bank-modal');renderBank();toast('已更新銀行名稱');
}

function deleteCurrentBank(){
  const bankName=document.getElementById('new-bank-name').value.trim();
  const count=db.bank.filter(r=>r.name===bankName).length;
  if(!confirm(`確定刪除「${bankName}」？\n此銀行共有 ${count} 筆記錄，將一併刪除。`))return;
  if(!db.bankAccounts) db.bankAccounts=getBankList();
  db.bankAccounts=db.bankAccounts.filter(n=>n!==bankName);
  db.bank=db.bank.filter(r=>r.name!==bankName);
  if(currentBank===bankName) currentBank=getBankList()[0]||'';
  save();closeModal('new-bank-modal');renderBank();toast(`已刪除銀行：${bankName}`);
}

function getForexHoldings(){
  const h={};
  db.forex.forEach(r=>{
    if(!h[r.currency])h[r.currency]={currency:r.currency,amount:0,costTWD:0};
    const x=h[r.currency];
    if(r.dir==='buy'){x.amount+=r.amount;x.costTWD+=r.amount*r.rate;}
    else{x.amount-=r.amount;x.costTWD-=r.amount*r.rate;}
  });
  return Object.values(h).filter(h=>h.amount>0.0001);
}

async function fetchForexRates(){
  const holdings=getForexHoldings();
  if(!holdings.length){toast('尚無外匯持倉');return}
  if(forexRateLoading){toast('正在查詢中...');return}
  forexRateLoading=true;

  const btn=document.getElementById('fetch-rate-btn');
  if(btn) btn.innerHTML='<i class="ti ti-loader"></i> 查詢中...';

  const PROXY='https://corsproxy.io/?';
  const currencies=[...new Set(holdings.map(h=>h.currency))];
  const results={};
  const errors=[];

  for(const cur of currencies){
    const symbol=FOREX_SYMBOLS[cur];
    if(!symbol){errors.push(cur+' (不支援)');continue;}
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
    try{
      const resp=await fetch(PROXY+encodeURIComponent(url));
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      const data=await resp.json();
      const meta=data?.chart?.result?.[0]?.meta;
      const price=meta?.regularMarketPrice||meta?.previousClose;
      if(price){
        results[cur]=price;
        if(!db.forexSpotRates) db.forexSpotRates={};
        if(!db.forexRates) db.forexRates={};
        db.forexSpotRates[cur]=price;
        db.forexRates[cur]=price; 
      } else {
        errors.push(cur);
      }
    }catch(e){
      errors.push(cur);
    }
  }

  if(btn) btn.innerHTML='<i class="ti ti-refresh"></i> 自動抓取即期匯率';
  forexRateLoading=false;

  if(Object.keys(results).length>0){
    save();
    openForexRateModal(true);
    const errMsg=errors.length?`，${errors.join('、')} 失敗`:'';
    toast(`即期匯率已更新${errMsg}`);
  } else {
    toast('匯率查詢失敗，請稍後再試');
  }
}

  const currencies=[...new Set(holdings.map(h=>h.currency))];

    const spread=db.cashSpread?.[cur]??0.5;                     // 【防呆修改】加上 ?.

    html+=`
    <div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px">
      <div style="font-weight:600;font-size:13px;margin-bottom:10px;color:var(--navy)">${cur}</div>

function updateCashPreview(cur){
  const spot=parseFloat(document.getElementById('fr-spot-'+cur)?.value)||0;
  const spread=parseFloat(document.getElementById('fr-spread-'+cur)?.value)||0;
  const cashEl=document.getElementById('fr-cash-'+cur);
  if(cashEl) cashEl.value=spot?(spot+spread).toFixed(4):'';
}

function saveForexRates(){
  const holdings=getForexHoldings();
  const currencies=[...new Set(holdings.map(h=>h.currency))];
  currencies.forEach(cur=>{
    const spot=parseFloat(document.getElementById('fr-spot-'+cur)?.value);
    const spread=parseFloat(document.getElementById('fr-spread-'+cur)?.value);
    if(spot>0){
      db.forexSpotRates[cur]=spot;
      db.forexRates[cur]=spot; 
    }
    if(!isNaN(spread)&&spread>=0){
      db.cashSpread[cur]=spread;
      if(spot>0) db.forexCashRates[cur]=spot+spread;
    }
  });
  save();closeModal('forex-rate-modal');renderAll();toast('匯率已更新');
}

function getFundHoldings(){
  const h={};
  db.fund.forEach(r=>{
    if(!h[r.name])h[r.name]={name:r.name,units:0,cost:0,lastNav:0};
    const x=h[r.name];
    if(r.type==='buy'){x.units+=r.units;x.cost+=r.amount;x.lastNav=r.nav;}
    else{x.units-=r.units;x.cost-=r.amount;x.lastNav=r.nav;}
  });
  return Object.values(h).filter(h=>h.units>0.0001);
}

  save();renderAll();toast('已刪除');
}

function exportData(){
  const wb = XLSX.utils.book_new();

  // 各銀行獨立工作表
  const bankList=getBankList();
  if(bankList.length===0){
    // 無銀行時輸出空工作表
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{日期:'',摘要:'',類型:'',金額:'',ID:''}]), '銀行存款');
  } else {
    bankList.forEach(bankName=>{
      const rows=db.bank.filter(r=>r.name===bankName).map(r=>({
        '日期':fmtDate(r.date),'摘要':r.desc||'',
        '類型':BANK_TYPE_LABEL[r.type]||r.type,'金額(TWD)':r.amount,'ID':r.id
      }));
      // 工作表名稱限31字元，去掉非法字元
      const sheetName=bankName.replace(/[:\\\/\?\*\[\]]/g,'').slice(0,28)||'銀行';
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{日期:'',摘要:'',類型:'',金額:'',ID:''}]), sheetName);
    });
  }


  const forexRows = db.forex.map(r=>({
    '日期':fmtDate(r.date),'幣別':r.currency,
    '交易類型':r.transType==='spot'?'即期':'現金',
    '買賣':r.dir==='buy'?'買入':'賣出',
    '外幣金額':r.amount,'匯率':r.rate,'備註':r.note||'','ID':r.id
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(forexRows.length?forexRows:[{日期:'',幣別:'',交易類型:'',買賣:'',外幣金額:'',匯率:'',備註:'',ID:''}]), '外匯交易');

  const rateRows = Object.entries(db.forexRates||{}).map(([cur,rate])=>({'幣別':cur,'目前匯率':rate}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rateRows.length?rateRows:[{幣別:'',目前匯率:''}]), '外匯匯率');

  const fundRows = db.fund.map(r=>({
    '日期':fmtDate(r.date),'基金名稱':r.name,
    '類型':r.type==='buy'?'申購':'贖回',
    '金額(TWD)':r.amount,'單位數':r.units,'淨值':r.nav,'備註':r.note||'','ID':r.id
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fundRows.length?fundRows:[{日期:'',基金名稱:'',類型:'',金額:'',單位數:'',淨值:'',備註:'',ID:''}]), '基金交易');

  XLSX.writeFile(wb, '投資理財_'+today()+'.xlsx');
  toast('已匯出 Excel 檔案');
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const newDb={bank:[],forex:[],fund:[],bankAccounts:[],forexRates:{},forexSpotRates:{},forexCashRates:{},cashSpread:{},meta:{version:1}};
      const bankTypeMap={'收入':'in','支出':'out','利息':'interest','股利':'dividend'};

      // 讀取各銀行工作表（排除已知非銀行的工作表名稱）
      const NON_BANK_SHEETS=new Set(['外匯交易','外匯匯率','基金交易']);
      wb.SheetNames.forEach(sheetName=>{
        if(NON_BANK_SHEETS.has(sheetName)) return;
        const ws=wb.Sheets[sheetName];
        const rows=XLSX.utils.sheet_to_json(ws)||[];
        if(rows.length===0) return;
        // 判斷是否為銀行工作表（有「日期」和「金額(TWD)」欄）
        const firstRow=rows[0];
        if(!('金額(TWD)' in firstRow) && !('摘要' in firstRow)) return;
        // 這是銀行工作表，工作表名稱就是銀行名稱
        if(!newDb.bankAccounts.includes(sheetName)) newDb.bankAccounts.push(sheetName);
        rows.forEach(r=>{
          if(!r['日期']&&!r['金額(TWD)'])return;
          newDb.bank.push({
            id:r['ID']||Date.now()+Math.random(),
            date:excelDateToStr(r['日期']),
            name:sheetName,
            desc:r['摘要']||'',
            type:bankTypeMap[r['類型']]||'in',
            amount:Number(r['金額(TWD)'])||0
          });
        });
      });

      // 兼容舊格式：單一「銀行存款」工作表
      if(newDb.bank.length===0 && wb.Sheets['銀行存款']){
        const ws=wb.Sheets['銀行存款'];
        (XLSX.utils.sheet_to_json(ws)||[]).forEach(r=>{
          if(!r['日期']&&!r['銀行'])return;
          const bname=r['銀行']||'銀行';
          if(!newDb.bankAccounts.includes(bname)) newDb.bankAccounts.push(bname);
          newDb.bank.push({
            id:r['ID']||Date.now()+Math.random(),
            date:excelDateToStr(r['日期']),
            name:bname,desc:r['摘要']||'',
            type:bankTypeMap[r['類型']]||'in',amount:Number(r['金額(TWD)'])||0
          });
        });
      }

      const forexWs=wb.Sheets['外匯交易'];
      if(forexWs){
        (XLSX.utils.sheet_to_json(forexWs)||[]).forEach(r=>{
          if(!r['幣別'])return;
          newDb.forex.push({id:r['ID']||Date.now()+Math.random(),
            date:excelDateToStr(r['日期']),
            currency:r['幣別'],transType:r['交易類型']==='即期'?'spot':'cash',
            dir:r['買賣']==='買入'?'buy':'sell',
            amount:Number(r['外幣金額'])||0,rate:Number(r['匯率'])||0,note:r['備註']||''});
        });
      }

      const rateWs=wb.Sheets['外匯匯率'];
      if(rateWs){
        (XLSX.utils.sheet_to_json(rateWs)||[]).forEach(r=>{
          if(r['幣別']&&r['目前匯率'])newDb.forexRates[r['幣別']]=Number(r['目前匯率']);
        });
      }

      const fundWs=wb.Sheets['基金交易'];
      if(fundWs){
        (XLSX.utils.sheet_to_json(fundWs)||[]).forEach(r=>{
          if(!r['基金名稱'])return;
          newDb.fund.push({id:r['ID']||Date.now()+Math.random(),
            date:excelDateToStr(r['日期']),
            name:r['基金名稱'],type:r['類型']==='申購'?'buy':'sell',
            amount:Number(r['金額(TWD)'])||0,units:Number(r['單位數'])||0,
            nav:Number(r['淨值'])||0,note:r['備註']||''});
        });
      }

      if(confirm(`匯入資料：\n銀行 ${newDb.bank.length} 筆（${newDb.bankAccounts.length} 家銀行）\n外匯 ${newDb.forex.length} 筆、基金 ${newDb.fund.length} 筆\n\n將覆蓋現有資料，確定繼續？`)){
        db=newDb;save();currentBank=newDb.bankAccounts[0]||'';renderAll();toast('Excel 匯入成功');
      }
    }catch(err){toast('匯入失敗：'+err.message);}
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

document.getElementById('forex-amount').addEventListener('input',updateForexPreview);
document.getElementById('forex-rate').addEventListener('input',updateForexPreview);
function updateForexPreview(){
  const a=parseFloat(document.getElementById('forex-amount').value)||0;
  const r=parseFloat(document.getElementById('forex-rate').value)||0;
  document.getElementById('forex-twd-preview').textContent=a&&r?fmt(a*r)+' TWD':'—';
}

load();renderAll();
initGoogleAPIs();
